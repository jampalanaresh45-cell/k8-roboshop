apiVersion: apps/v1 
kind: Deployment
metadata:
  name: frontend
  namespace: roboshop
  ########### Replica set labels ###############
  labels: 
    project: roboshop
    component: frontend
    tier: frontend
spec:
  replicas: 1
  selector:
  ######### These are used to select pods ##############
    matchLabels:
      project: roboshop
      component: frontend
      tier: frontend
### pod definition ########

  template:
    metadata:
      labels:
          project: roboshop
          component: frontend
          tier: frontend
    spec:
      containers:
      - name: frontend
        image: naresh1567/frontend:v1
        imagePullPolicy: Always
        ports:
        - name: liveness-port
          containerPort: 80
        readinessProbe:
          httpGet:
            path: /
            port: liveness-port
          failureThreshold: 1
          periodSeconds: 60
          
        livenessProbe:
          httpGet:
            path: /
            port: liveness-port
          failureThreshold: 1
          periodSeconds: 10
---
apiVersion: v1 
kind: Service
metadata:
    name: frontend
    namespace: roboshop
spec:    
    selector:
      project: roboshop
      component: frontend
      tier: frontend
    ports:
    - protocol: TCP
      port: 80 ## service port
      targetPort: 80 ## container port