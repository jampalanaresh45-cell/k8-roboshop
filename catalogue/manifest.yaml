apiVersion: apps/v1 
kind: Deployment
metadata:
  name: catalogue
  namespace: roboshop
  ########### Replica set labels ###############
  labels: 
    project: roboshop
    component: catalogue
    tier: backend
spec:
  replicas: 1
  selector:
  ######### These are used to select pods ##############
    matchLabels:
      project: roboshop
      component: catalogue
      tier: backend
### pod definition ########

  template:
    metadata:
      labels:
          project: roboshop
          component: catalogue
          tier: backend
    spec:
      containers:
      - name: catalogue
        image: naresh1567/catalogue:v1
        ports:
        - name: liveness-port
          containerPort: 8080
        readinessProbe:
          httpGet:
            path: /healthz
            port: liveness-port
          failureThreshold: 1
          periodSeconds: 60
          
        livenessProbe:
          httpGet:
            path: /healthz
            port: liveness-port
          failureThreshold: 1
          periodSeconds: 10
---
apiVersion: v1 
kind: Service
metadata:
    name: catalogue
    namespace: roboshop
spec:    
    selector:
      project: roboshop
      component: catalogue
      tier: backend
    ports:
    - protocol: TCP
      port: 8080 ## service port
      targetPort: 8080 ## container port