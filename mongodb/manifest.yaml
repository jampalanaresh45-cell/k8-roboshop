apiVersion: apps/v1 
kind: Deployment
metadata:
  name: mongodb
  namespace: roboshop
  ########### Replica set labels ###############
  labels: 
    project: roboshop
    component: mongodb
    tier: db
spec:
  replicas: 1
  selector:
  ######### These are used to select pods ##############
    matchLabels:
      project: roboshop
      component: mongodb
      tier: db
### pod definition ########

  template:
    metadata:
      labels:
          project: roboshop
          component: mongodb
          tier: db
    spec:
      containers:
      - name: mongodb
        image: naresh1567/mongo:7.0